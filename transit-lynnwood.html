<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transit Departures — Lynnwood City Center</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--card-bg:#1c2129;--border:#21262d;--text:#e6edf3;--text-dim:#8b949e;--accent-rail:#3b82f6;--accent-bus:#f59e0b;--accent-streetcar:#10b981;--live:#22c55e;--font-mono:"SF Mono","Cascadia Code","Fira Code","Consolas",monospace;--font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#000;color:var(--text);font-family:var(--font-sans);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;min-height:100dvh;padding:0}
#board{width:100%;height:100vh;height:100dvh;background:var(--bg);overflow:hidden;display:flex;flex-direction:column}
@media(min-width:600px){body{padding:24px 16px}#board{height:calc(100vh - 48px);height:calc(100dvh - 48px);border:1px solid var(--border);border-radius:12px}}
header{background:var(--surface);padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.station-name{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.header-meta{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:13px;color:var(--text-dim)}
.update-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 2s ease-in-out infinite}
.update-dot.error{background:#ef4444;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.category{border-bottom:1px solid var(--border);flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.category:last-of-type{border-bottom:none}
.card-grid{display:flex;flex-wrap:wrap;align-content:flex-start;gap:10px;padding:8px 16px;flex:1;min-height:0;overflow:hidden}
.dep-card{flex:1 1 280px;height:100px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:row;padding:14px 8px 14px 16px;gap:20px;align-items:center;overflow:hidden}
.dep-card:hover{background:var(--surface)}
.card-info{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;height:100%}
.badge-row{display:flex;align-items:center;gap:6px}
.route-badge{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;color:#fff;white-space:nowrap}
.mode-label{font-size:10px;font-weight:500;color:var(--text-dim);text-transform:uppercase}
.dest-wrap{flex:1;display:flex;align-items:center;min-height:0}
.dest{font-size:14px;font-weight:500;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.eta-area{width:70px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.eta-area .live-icon{font-size:16px;color:var(--live)}.eta-area .sched-label{font-size:9px;color:var(--text-dim)}
.eta-area .eta-num{font-family:var(--font-mono);font-size:44px;font-weight:700;line-height:1;color:var(--text)}
.eta-area .eta-num.now{font-size:26px;color:var(--live)}
.eta-area .eta-num.sched{color:#6b7280}
.eta-area .eta-unit{font-size:12px;color:var(--text-dim)}
.loading,.no-data{padding:16px 8px;color:var(--text-dim);font-size:13px;width:100%}
footer{background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim)}
footer a{color:var(--accent-rail);text-decoration:none}
footer a:hover{text-decoration:underline}
@media(max-width:479px){header{padding:14px 16px 12px}.station-name{font-size:16px}.card-grid{padding:6px 12px;gap:8px}.dep-card{flex:1 1 100%;height:90px;padding:12px 8px 12px 14px;gap:16px}.eta-area .eta-num{font-size:36px}footer{padding:8px 16px}}
  </style>
</head>
<body>
  <div id="board">
    <header>
      <div class="station-name">Lynnwood City Center</div>
      <div class="header-meta">
        <span class="clock" id="clock"></span>
        <span class="update-dot" id="updateDot" title="Live"></span>
      </div>
    </header>
    <div class="category" id="bus-section">
      <div class="card-grid" id="bus-departures"><div class="loading">Loading…</div></div>
    </div>
    <div class="category" id="rail-section">
      <div class="card-grid" id="rail-departures"><div class="loading">Loading…</div></div>
    </div>
    <div class="category" id="express-section">
      <div class="card-grid" id="express-departures"><div class="loading">Loading…</div></div>
    </div>
    <footer>
      <span>Data from <a href="https://onebusaway.org" target="_blank" rel="noopener">OneBusAway</a></span>
      <span id="lastUpdate"></span>
    </footer>
  </div>

<script>
const OBA_BASE="https://api.pugetsound.onebusaway.org/api/where";
const OBA_KEY="TEST";
const REFRESH_INTERVAL=30000;
const MINUTES_AFTER=60;

const STOPS={
  rail:[{id:"40_N23-T1"},{id:"40_N23-T2"}],
  bus:[
    {id:"29_2035"},{id:"29_2107"},{id:"29_2108"},{id:"29_2109"},{id:"29_2110"},
    {id:"29_2115"},{id:"29_2116"},{id:"29_2117"},{id:"29_2119"},
    {id:"29_2167"},{id:"29_2168"},{id:"29_3311"},
  ],
  express:[{id:"29_2113"},{id:"29_2118"},{id:"29_2422"},{id:"29_2543"},{id:"29_2114"},{id:"29_3227"}],
};

const MODE_LABELS={rail:"Light Rail",bus:"Community Transit",express:"ST Express"};

function classifyRoute(routeType,agencyId){
  if(routeType===0&&agencyId==="40")return"rail";
  if(routeType===3&&agencyId==="40")return"express";
  return"bus";
}

async function fetchArrivals(stopId){
  const url=`${OBA_BASE}/arrivals-and-departures-for-stop/${stopId}.json?key=${OBA_KEY}&minutesBefore=0&minutesAfter=${MINUTES_AFTER}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error(`API error ${res.status}`);
  const json=await res.json();
  const entry=json.data.entry;
  const refs=json.data.references;
  const routeMap={};
  for(const r of refs.routes||[])routeMap[r.id]=r;
  return entry.arrivalsAndDepartures.map(a=>{
    const route=routeMap[a.routeId]||{};
    const predicted=a.predictedDepartureTime||a.predictedArrivalTime;
    const scheduled=a.scheduledDepartureTime||a.scheduledArrivalTime;
    const isLive=predicted>0;
    const arrivalMs=isLive?predicted:scheduled;
    let shortName=route.shortName||route.id||"?";
    shortName=shortName.replace(/\s*Streetcar$/i,"");
    return{routeShort:shortName,routeLong:route.longName||"",headsign:a.tripHeadsign||route.longName||"",arrivalMs,isLive,
      routeType:route.type,mode:classifyRoute(route.type,route.agencyId),
      routeColor:route.color?`#${route.color}`:null,
      routeTextColor:route.textColor?`#${route.textColor}`:null,stopId};
  });
}

async function fetchAll(){
  const allIds=[...STOPS.rail,...STOPS.bus,...STOPS.express].map(s=>s.id);
  const results=await Promise.allSettled(allIds.map(id=>fetchArrivals(id)));
  const deps=[];
  for(const r of results)if(r.status==="fulfilled")deps.push(...r.value);
  const seen=new Set();const unique=[];
  for(const d of deps){const k=`${d.routeShort}-${d.headsign}-${d.arrivalMs}`;if(!seen.has(k)){seen.add(k);unique.push(d);}}
  unique.sort((a,b)=>a.arrivalMs-b.arrivalMs);
  return unique;
}

function formatEta(ms){const m=Math.round((ms-Date.now())/60000);return m<=0?{text:"NOW",isNow:true}:{text:`${m}`,isNow:false};}

function renderCard(dep){
  const eta=formatEta(dep.arrivalMs);
  const modeLabel=MODE_LABELS[dep.mode]||dep.mode;
  const badgeAttr=dep.routeColor
    ?`class="route-badge" style="background:${dep.routeColor};color:${dep.routeTextColor||'#fff'}"`
    :`class="route-badge"`;
  const liveIndicator=eta.isNow?"":dep.isLive?'<span class="material-icons live-icon">rss_feed</span>':'<span class="sched-label">Scheduled</span>';
  const etaNum=eta.isNow?'<span class="eta-num now">NOW</span>':dep.isLive?`<span class="eta-num">${eta.text}</span>`:`<span class="eta-num sched">${eta.text}</span>`;
  const etaUnit=eta.isNow?"":'<span class="eta-unit">min</span>';
  return`<div class="dep-card"><div class="card-info"><div class="badge-row"><div ${badgeAttr}>${dep.routeShort}</div><span class="mode-label">${modeLabel.toUpperCase()}</span></div><div class="dest-wrap"><div class="dest">${dep.headsign}</div></div></div><div class="eta-area">${liveIndicator}${etaNum}${etaUnit}</div></div>`;
}

function renderSection(id,deps){
  const el=document.getElementById(id);
  if(!deps.length){el.innerHTML='<div class="no-data">No upcoming departures</div>';return;}
  const s=getComputedStyle(el);
  const pL=parseFloat(s.paddingLeft)||16,pR=parseFloat(s.paddingRight)||16;
  const pT=parseFloat(s.paddingTop)||4,pB=parseFloat(s.paddingBottom)||12;
  const gap=parseFloat(s.gap)||8;
  const aW=el.clientWidth-pL-pR,aH=el.clientHeight-pT-pB;
  const cardW=280,cardH=100;
  const cols=Math.max(1,Math.floor((aW+gap)/(cardW+gap)));
  const rows=Math.max(1,Math.floor((aH+gap)/(cardH+gap)));
  el.innerHTML=deps.slice(0,cols*rows).map(renderCard).join("");
}

function updateClock(){
  document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
}

const lastData={rail:[],bus:[],express:[]};

async function update(){
  const dot=document.getElementById("updateDot");
  try{
    const deps=await fetchAll();
    const rail=deps.filter(d=>d.mode==="rail");
    const bus=deps.filter(d=>d.mode==="bus");
    const express=deps.filter(d=>d.mode==="express");
    if(rail.length)lastData.rail=rail;
    if(bus.length)lastData.bus=bus;
    if(express.length)lastData.express=express;
    renderSection("rail-departures",lastData.rail);
    renderSection("bus-departures",lastData.bus);
    renderSection("express-departures",lastData.express);
    dot.classList.remove("error");
    document.getElementById("lastUpdate").textContent=`Updated ${new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}`;
  }catch(e){
    console.error("Update failed:",e);dot.classList.add("error");
    renderSection("rail-departures",lastData.rail);
    renderSection("bus-departures",lastData.bus);
    renderSection("express-departures",lastData.express);
  }
}

updateClock();setInterval(updateClock,1000);
update();setInterval(update,REFRESH_INTERVAL);
let resizeTimer;window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{
  renderSection("rail-departures",lastData.rail);
  renderSection("bus-departures",lastData.bus);
  renderSection("express-departures",lastData.express);
},200);});
</script>
</body>
</html>
