<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextUp Transit</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div id="board">
  <header>
    <div class="station" onclick="if(!Object.keys(STATIONS).length)return;renderLocationMenu();document.getElementById('locMenu').classList.toggle('open')"><span class="header-star" id="headerStar" onclick="event.stopPropagation();toggleDefaultLocation()"><svg viewBox="0 0 20 21" fill="none"><path d="M19.343 7.661L11.448.556C10.625-.185 9.375-.185 8.552.556L.657 7.661A1.89 1.89 0 000 9.113V19c0 1.105.943 2 2.105 2H7v-9h6v9h4.895c1.162 0 2.105-.895 2.105-2V9.113c0-.55-.238-1.074-.657-1.452z"/></svg></span><span id="stationName">Capitol Hill</span>
      <div class="loc-menu" id="locMenu"></div>
    </div>
    <div class="clock" id="clock"></div>
    <div class="dot" id="dot"></div>
  </header>
  <div class="results" id="results"><div class="loading">Loading…</div></div>
  <footer>
    <button class="theme-toggle" onclick="toggleTheme()"><span class="material-icons" id="themeIcon" style="font-size:14px">brightness_auto</span><span id="themeLabel">Auto</span></button>
    <span id="updated">v6.3</span>
  </footer>
</div>

<div id="onboardModal" class="onboard-overlay" style="display:none">
  <div class="onboard-card" id="onboardCard"></div>
</div>

<div id="creationModal" class="modal-overlay" style="display:none">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">Add Location</span>
      <span class="material-icons modal-close" onclick="closeCreationModal()">close</span>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Steps rendered dynamically -->
    </div>
  </div>
</div>

<script src="transit-logic.js"></script>
  <script src="transit-api.js"></script>
  <script src="transit-store.js"></script>
  <script src="app-state.js"></script>
  <script src="home.js"></script>
  <script src="route-detail.js"></script>
</body>
</html>
