<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextUp Transit</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--card-bg:#161b22;--border:#21262d;--text:#e6edf3;--dim:#8b949e;--live:#22c55e;--accent:#3B82F6;
--font-mono:"SF Mono","Cascadia Code","Fira Code","Consolas",monospace;
--font-sans:"Noto Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#000;color:var(--text);font-family:var(--font-sans);display:flex;justify-content:center;min-height:100vh;min-height:100dvh;padding:0}
#board{width:100%;height:100vh;height:100dvh;background:var(--bg);overflow:hidden;display:flex;flex-direction:column}
header{background:var(--surface);padding:14px 16px 10px;display:flex;align-items:center;gap:12px}
.station{font-size:36px;font-weight:700;flex:1;cursor:pointer;position:relative;user-select:none;display:flex;align-items:center;gap:8px}
.header-star{cursor:pointer;flex-shrink:0;user-select:none;transition:opacity 0.15s;display:flex;align-items:center}
.header-star:hover{opacity:0.7}
.header-star svg{width:18px;height:18px}
.header-star svg path{fill:var(--dim)}
.header-star.is-default svg path{fill:#FDB71A}

.loc-menu{display:none;position:absolute;top:100%;left:0;margin-top:8px;background:#1e252e;border:1px solid #3a424d;border-radius:12px;padding:6px 0;min-width:280px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.loc-menu.open{display:block}
.loc-menu-top{padding:4px 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.loc-menu-columns{display:flex}
.loc-menu-col{flex:1;min-width:0}
.loc-menu-col+.loc-menu-col{border-left:1px solid var(--border)}
.loc-section-title{padding:6px 20px 4px;font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px}
.loc-item{display:block;padding:10px 20px;color:var(--text);text-decoration:none;font-size:16px;font-weight:500;cursor:pointer}
.loc-item:hover{background:var(--border)}
.loc-item.active{color:var(--accent);font-weight:700}
.loc-item.loc-add{color:var(--dim);display:flex;align-items:center;gap:8px;font-size:14px;padding:8px 16px}
.loc-item.loc-add:hover{color:var(--accent)}
.loc-item.loc-custom{display:flex;align-items:center;gap:8px;position:relative;padding-right:36px}
.loc-custom-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loc-delete{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--dim);cursor:pointer;opacity:0.5;transition:opacity 0.15s,color 0.15s;border:none;background:none;padding:2px;line-height:1}
.loc-delete:hover{opacity:1;color:#f85149}
.loc-home{cursor:pointer;opacity:0.3;transition:opacity 0.15s;flex-shrink:0;display:flex;align-items:center}
.loc-home:hover{opacity:0.7}
.loc-home svg{width:16px;height:16px}
.loc-home svg path{fill:var(--dim)}
.loc-home.is-default{opacity:0.9}
.loc-home.is-default svg path{fill:#FDB71A}
.clock{font-family:var(--font-mono);font-size:22px;color:var(--dim)}
.dot{width:10px;height:10px;border-radius:50%;background:var(--live);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.results{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(600px,100%),1fr));align-content:start;gap:12px;padding:16px;overflow-y:auto;overflow-x:hidden}
.card{background:var(--card-bg);border-radius:24px;display:flex;align-items:center;padding:20px;gap:16px;transition:transform 0.4s ease,opacity 0.3s ease;cursor:pointer;position:relative;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;overflow:visible}
.card.pinned{border-radius:48px}
.card-pin{position:absolute;top:-4px;left:-4px;color:#FFC94F;opacity:0.9;font-size:16px;z-index:1}
.card-pin svg{width:16px;height:16px;fill:#FFC94F}
.badge{width:76px;height:76px;border-radius:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;flex-direction:column;gap:-2px}
.badge.square{border-radius:24px}
.badge-num{font-family:var(--font-sans);font-weight:900;font-size:38px}
.badge-num.sm{font-size:24px}
.badge-sub{font-size:10px;font-weight:700;opacity:0.55;color:#fff;margin-top:-4px}
.badge-icon{font-size:36px;color:#fff;font-family:'Material Symbols Rounded'}
.info{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;overflow:hidden}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700;align-self:flex-start;flex-shrink:0}
.dest{font-size:22px;font-weight:600;overflow:hidden;line-height:1.2;min-width:0;word-wrap:break-word;white-space:normal;color:var(--text)}
.etas{display:flex;gap:6px;flex-shrink:0;align-items:center}
.pill{width:82px;height:82px;border-radius:41px;background:rgba(255,255,255,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:visible}
.pill.now{width:auto;min-width:100px;border-radius:41px;background:rgba(255,255,255,0.06);flex-direction:row;gap:3px;padding:0 18px}
.pill-num{font-family:var(--font-sans);font-size:34px;font-weight:700;line-height:1;color:var(--text)}
.pill.sched .pill-num{color:var(--dim)}
.pill.now .pill-num{font-size:24px;font-weight:900;color:#0DFF66;animation:pulse 2s ease-in-out infinite}
.pill-min{font-size:8px;font-weight:500;color:var(--dim);margin-top:-4px}
.pill.now .pill-min{display:none}
.pill-live{position:absolute;top:12px;right:12px;font-size:12px;color:var(--live);font-family:'Material Symbols Rounded'}
.pill.live-near{background:rgba(255,255,255,0.06)}
.pill.live-far{background:rgba(255,255,255,0.06)}
.pill.sched{background:rgba(255,255,255,0.06)}
.next-day-times{display:flex;gap:12px;align-items:center;color:var(--dim);font-size:28px;font-weight:700;font-family:var(--font-sans)}
footer{background:var(--surface);padding:6px 32px;display:flex;justify-content:space-between;font-size:12px;color:var(--dim);align-items:center}
footer a{color:#3b82f6;text-decoration:none}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;color:var(--dim);font-size:11px;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;gap:4px}
.theme-toggle:hover{color:var(--text);border-color:var(--dim)}
/* Light theme */
body.light{--bg:#ffffff;--surface:#f5f7fa;--card-bg:#ffffff;--border:#e2e8f0;--text:#0f1419;--dim:#64748b;--live:#16a34a;--accent:#3B82F6}
body.light .card{background:var(--card-bg)}
body.light .dest{color:var(--text)}
body.light .pill{background:rgba(255,255,255,0.6)}
body.light .pill.now{background:rgba(255,255,255,0.6)}
body.light .pill.live-near{background:rgba(255,255,255,0.6)}
body.light .pill.live-far{background:rgba(255,255,255,0.6)}
body.light .pill.sched{background:rgba(255,255,255,0.6)}
body.light .pill-num{color:var(--text)}
body.light .pill.sched .pill-num{color:var(--dim)}
body.light .pill.now .pill-num{color:#16a34a}
body.light .pill-live{color:#16a34a}
body.light .clock{color:var(--dim)}
body.light .loc-menu{background:#fff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
body.light .loc-item:hover{background:#f1f5f9}
body.light .tag{background:rgba(255,255,255,0.7)!important}
body.light .card-pin svg{fill:#E99300}
.loading{padding:20px;color:var(--dim);font-size:14px}
.section-divider{grid-column:1/-1;height:1px;background:var(--border);margin:4px 0}
@media(max-width:700px){
  header{padding:10px 12px 8px}
  .results{padding:8px;gap:8px;grid-template-columns:1fr}
  .card{padding:14px;gap:12px;border-radius:20px}
  .card.pinned{border-radius:40px}
  .badge{width:56px;height:56px;border-radius:28px}
  .badge.square{border-radius:16px}
  .badge-num{font-size:26px}
  .badge-num.sm{font-size:18px}
  .badge-sub{font-size:8px}
  .badge-icon{font-size:26px}
  .info{gap:3px}
  .tag{font-size:10px;padding:3px 8px;border-radius:10px}
  .dest{font-size:16px}
  .etas{gap:4px}
  .pill{width:56px;height:56px;border-radius:28px}
  .pill.now{min-width:72px;border-radius:28px;padding:0 12px}
  .pill-num{font-size:24px}
  .pill.now .pill-num{font-size:15px}
  .pill-min{font-size:6px;margin-top:-2px}
  .pill-live{top:8px;right:8px;font-size:10px}
  .next-day-times{font-size:16px;gap:8px}
  footer{padding:4px 14px;font-size:9px}
}
@media(max-width:430px){
  .card{padding:10px;gap:10px;border-radius:18px}
  .card.pinned{border-radius:36px}
  .badge{width:48px;height:48px;border-radius:24px}
  .badge.square{border-radius:14px}
  .badge-num{font-size:22px}
  .badge-num.sm{font-size:16px}
  .badge-icon{font-size:22px}
  .dest{font-size:15px}
  .pill{width:48px;height:48px;border-radius:24px}
  .pill.now{min-width:64px;border-radius:24px;padding:0 10px}
  .pill-num{font-size:22px}
  .pill.now .pill-num{font-size:14px}
  .pill-min{font-size:5px}
  .pill-live{top:8px;right:8px;font-size:9px}
  .next-day-times{font-size:14px;gap:6px}
}
/* Creation Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:20px;font-weight:700}
.modal-close{cursor:pointer;color:var(--dim);font-size:24px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-spinner{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 0;color:var(--dim)}
.modal-spinner .material-icons{font-size:40px;animation:spin 1.5s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.modal-error{color:#f85149;font-size:14px;margin-top:8px}
.modal-msg{font-size:16px;color:var(--dim);text-align:center}
.modal-actions{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.modal-btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-sans)}
.modal-btn:hover{background:var(--border)}
.modal-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-btn.primary:hover{opacity:0.9}
/* Stop list in modal */
.stop-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.stop-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.stop-item:hover{border-color:var(--dim)}
.stop-item.selected{border-color:var(--accent)}
.stop-item input[type="checkbox"]{margin-top:3px;accent-color:var(--accent)}
.stop-info{flex:1;min-width:0}
.stop-name{font-size:15px;font-weight:600}
.stop-dir{font-size:12px;color:var(--dim)}
.stop-routes{font-size:12px;color:var(--dim);margin-top:2px}
/* Name input */
.modal-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:16px;font-family:var(--font-sans)}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-label{font-size:14px;font-weight:600;margin-bottom:6px;display:block;color:var(--dim)}
/* Map in modal */
#stopMap{width:100%;height:280px;border-radius:10px;margin:8px 0 12px;border:1px solid var(--border);position:relative}
.map-counter{font-size:13px;color:var(--dim);margin-bottom:4px}
.map-rescan{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;padding:6px 16px;border-radius:20px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(--font-sans);box-shadow:0 2px 8px rgba(0,0,0,0.4);display:none}
.map-rescan:hover{opacity:0.9}
</style>
</head>
<body>
<div id="board">
  <header>
    <div class="station" onclick="document.getElementById('locMenu').classList.toggle('open')"><span class="header-star" id="headerStar" onclick="event.stopPropagation();toggleDefaultLocation()"><svg viewBox="0 0 20 21" fill="none"><path d="M19.343 7.661L11.448.556C10.625-.185 9.375-.185 8.552.556L.657 7.661A1.89 1.89 0 000 9.113V19c0 1.105.943 2 2.105 2H7v-9h6v9h4.895c1.162 0 2.105-.895 2.105-2V9.113c0-.55-.238-1.074-.657-1.452z"/></svg></span><span id="stationName">Capitol Hill</span>
      <div class="loc-menu" id="locMenu"></div>
    </div>
    <div class="clock" id="clock"></div>
    <div class="dot" id="dot"></div>
  </header>
  <div class="results" id="results"><div class="loading">Loading…</div></div>
  <footer>
    <span>Data from <a href="https://onebusaway.org" target="_blank">OneBusAway</a> · v4.3.1-m3</span>
    <button class="theme-toggle" onclick="toggleTheme()"><span class="material-icons" style="font-size:14px">brightness_6</span><span id="themeLabel">Light</span></button>
    <span id="updated"></span>
  </footer>
</div>

<div id="creationModal" class="modal-overlay" style="display:none">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">Add Location</span>
      <span class="material-icons modal-close" onclick="closeCreationModal()">close</span>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Steps rendered dynamically -->
    </div>
  </div>
</div>

<script src="transit-logic.js"></script>
<script>
const OBA="https://api.pugetsound.onebusaway.org/api/where";
const KEY="TEST";
// ===== MULTI-STATION CONFIG =====
const STATIONS={
  caphill:{
    name:"Capitol Hill",
    stops:{rail:["40_99610","40_99603"],bus:["1_11180","1_11050","1_29270","1_29262","1_11060"],streetcar:["1_11175"]},
    priority:["1","2","8","49","11","12","First Hill"],
    classify(type,agencyId,shortName){
      if(type===0&&agencyId==="40")return{mode:"rail",tag:"Light Rail",badge:"round"};
      if(type===0)return{mode:"streetcar",tag:shortName.replace(/\s*Streetcar$/i," Streetcar").trim(),badge:"square"};
      if(type===2&&agencyId==="96")return{mode:"monorail",tag:"Monorail",badge:"square"};
      if(type===3&&agencyId==="40")return{mode:"express",tag:"ST Express",badge:"square"};
      if(type===3&&shortName.match(/Line$/i))return{mode:"rapid",tag:"RapidRide",badge:"square"};
      return{mode:"bus",tag:"KC Bus",badge:"square"};
    }
  },
  lynnwood:{
    name:"Lynnwood City Center",
    stops:{rail:["40_N23-T1","40_N23-T2"],bus:["29_2035","29_2107","29_2108","29_2109","29_2110","29_2115","29_2116","29_2117","29_2119","29_2167","29_2168","29_3311"],express:["29_2113","29_2118","29_2422","29_2543","29_2114","29_3227"]},
    priority:["1","2","Swift Orange","Swift Blue","120"],
    classify(type,agencyId,shortName){
      if(type===0&&agencyId==="40")return{mode:"rail",tag:"Light Rail",badge:"round"};
      if(type===3&&agencyId==="40")return{mode:"express",tag:"ST Express",badge:"square"};
      if(type===3&&(shortName||"").match(/^Swift/i))return{mode:"swift",tag:shortName,badge:"square",isSwift:true};
      return{mode:"bus",tag:"Community Transit",badge:"square"};
    }
  },
  dennypark:{
    name:"Denny & Westlake",
    stops:{bus:["1_2255","1_2291","1_2260","1_2285"],streetcar:["1_26665","1_26690","1_26645"]},
    priority:["8","C","South Lake Union"],
    classify(type,agencyId,shortName){
      if(type===0&&agencyId==="23")return{mode:"streetcar",tag:shortName.replace(/\s*Streetcar$/i," Streetcar").trim(),badge:"square"};
      if(type===3&&shortName.match(/Line$/i))return{mode:"rapid",tag:"RapidRide",badge:"square"};
      return{mode:"bus",tag:"KC Bus",badge:"square"};
    }
  }
};

// Resolve location: URL param > stored active > default (caphill)
const urlParams=new URLSearchParams(window.location.search);
const customLocations=loadCustomLocations();
const resolved=resolveLocation(urlParams.get("station"), Object.keys(STATIONS), customLocations, genericClassify);
let currentStation=resolved.id;
let currentType=resolved.type;
let CFG;
if(resolved.type==='custom'){
  const cl=customLocations.find(l=>l.id===resolved.id);
  CFG=cl?buildCustomConfig(cl,genericClassify):STATIONS.caphill;
} else {
  CFG=STATIONS[resolved.id]||STATIONS.caphill;
}
saveActiveLocation(resolved.type, resolved.id);

function handleDeleteLocation(id){
  // Find the location name for the confirmation message
  var customs=loadCustomLocations();
  var loc=null;
  for(var i=0;i<customs.length;i++){if(customs[i].id===id){loc=customs[i];break;}}
  if(!loc) return;

  if(!confirm('Delete "'+loc.name+'"?')) return;

  // Delete from localStorage
  deleteCustomLocation(id);

  // Re-render location menu
  renderLocationMenu();

  // If deleted location was active, switch to caphill
  if(currentType==='custom'&&currentStation===id){
    switchLocation('builtin','caphill');
  }
}

function toggleDefaultLocation(){
  var def=loadDefaultLocation();
  if(def&&def.type===currentType&&def.id===currentStation){
    clearDefaultLocation();
  } else {
    saveDefaultLocation(currentType,currentStation);
  }
  updateHeaderStar();
  renderLocationMenu();
}

var HOME_FILLED='<svg viewBox="0 0 20 21" fill="none"><path d="M19.343 7.661L11.448.556C10.625-.185 9.375-.185 8.552.556L.657 7.661A1.89 1.89 0 000 9.113V19c0 1.105.943 2 2.105 2H7v-9h6v9h4.895c1.162 0 2.105-.895 2.105-2V9.113c0-.55-.238-1.074-.657-1.452z"/></svg>';
var HOME_OUTLINE='<svg viewBox="0 0 24 24" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M1.636 21.58c0 .334.244.605.546.605H7.09v-5.446c0-3.007 2.198-5.446 4.91-5.446 2.71 0 4.909 2.439 4.909 5.446v5.446h4.909c.301 0 .545-.271.545-.605v-8.808c0-.907-.367-1.767-1-2.341L13.727 2.5c-1.005-.912-2.45-.912-3.454 0L2.637 10.43a3.36 3.36 0 00-1 2.341v8.808zM8.727 24H2.182C.977 24 0 22.916 0 21.58v-8.808c0-1.452.587-2.827 1.6-3.747L9.237 1.094C10.844-.365 13.156-.365 14.763 1.094l7.636 7.931C23.413 9.945 24 11.32 24 12.772v8.808C24 22.916 23.023 24 21.818 24h-6.545v-7.261c0-2.005-1.465-3.63-3.273-3.63s-3.273 1.625-3.273 3.63V24z"/></svg>';

function updateHeaderStar(){
  var el=document.getElementById("headerStar");
  var def=loadDefaultLocation();
  var isDefault=def&&def.type===currentType&&def.id===currentStation;
  el.innerHTML=isDefault?HOME_FILLED:HOME_OUTLINE;
  if(isDefault){el.classList.add("is-default");}else{el.classList.remove("is-default");}
}

function setDefaultFromMenu(type,id,event){
  event.stopPropagation();
  var def=loadDefaultLocation();
  if(def&&def.type===type&&def.id===id){
    clearDefaultLocation();
  } else {
    saveDefaultLocation(type,id);
  }
  updateHeaderStar();
  renderLocationMenu();
}

function showCreationModal(){
  document.getElementById("creationModal").style.display="flex";
  document.getElementById("locMenu").classList.remove("open");
  startGeolocation();
}
function closeCreationModal(){
  if(_mapInstance){_mapInstance.remove();_mapInstance=null;}
  _mapMarkers=[];
  _mapSelectedStops={};
  document.getElementById("creationModal").style.display="none";
  document.getElementById("modalBody").innerHTML="";
}

function startGeolocation(){
  var body=document.getElementById("modalBody");
  body.innerHTML='<div class="modal-spinner"><span class="material-icons">my_location</span><div class="modal-msg">Finding your location...</div></div>';

  if(!navigator.geolocation){
    body.innerHTML='<div class="modal-msg">Your browser doesn\'t support geolocation.</div><div class="modal-actions"><button class="modal-btn" onclick="closeCreationModal()">Cancel</button></div>';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos){
      // Success — store coords and move to stop discovery (Task 6.3)
      window._addLocCoords={lat:pos.coords.latitude,lon:pos.coords.longitude};
      discoverNearbyStops(pos.coords.latitude, pos.coords.longitude);
    },
    function(err){
      if(err.code===1){
        // Permission denied
        body.innerHTML='<div class="modal-msg" style="color:var(--text)">📍 Location access is needed to find nearby stops.</div><div class="modal-msg" style="margin-top:8px">Please enable location permissions and try again.</div><div class="modal-actions"><button class="modal-btn" onclick="closeCreationModal()">Cancel</button></div>';
      } else {
        // Timeout or other error
        body.innerHTML='<div class="modal-msg" style="color:var(--text)">Couldn\'t determine your location.</div><div class="modal-actions"><button class="modal-btn" onclick="startGeolocation()">Retry</button><button class="modal-btn" onclick="closeCreationModal()">Cancel</button></div>';
      }
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}

async function discoverNearbyStops(lat,lon){
  var body=document.getElementById("modalBody");
  body.innerHTML='<div class="modal-spinner"><span class="material-icons">explore</span><div class="modal-msg">Discovering nearby stops...</div></div>';
  try{
    var r=await fetch(OBA+"/stops-for-location.json?key="+KEY+"&lat="+lat+"&lon="+lon+"&radius=400");
    if(!r.ok) throw new Error("API error");
    var j=await r.json();
    var routeRefs={};
    for(var rt of (j.data.references.routes||[])) routeRefs[rt.id]=rt;
    var stops=(j.data.list||[]).map(function(s){
      var routeNames=(s.routeIds||[]).map(function(rid){
        var rt=routeRefs[rid];
        return rt?rt.shortName||rt.longName||"":"";
      }).filter(Boolean);
      return{id:s.id,name:s.name,direction:s.direction||"",lat:s.lat,lon:s.lon,routeNames:routeNames};
    });
    if(!stops.length){
      body.innerHTML='<div class="modal-msg" style="color:var(--text)">No transit stops found near your location.</div><div class="modal-actions"><button class="modal-btn" onclick="closeCreationModal()">Cancel</button></div>';
      return;
    }
    window._nearbyStops=stops;
    renderStopSelector(stops);
  }catch(e){
    body.innerHTML='<div class="modal-msg" style="color:var(--text)">Couldn\'t load nearby stops.</div><div class="modal-actions"><button class="modal-btn" onclick="discoverNearbyStops('+lat+','+lon+')">Retry</button><button class="modal-btn" onclick="closeCreationModal()">Cancel</button></div>';
  }
}

var _mapSelectedStops={};
var _mapInstance=null;
var _mapMarkers=[];
var _mapInitialCenter=null;

function renderStopSelector(stops){
  var body=document.getElementById("modalBody");
  var defaultName=suggestDefaultName(stops);
  // All stops selected by default
  _mapSelectedStops={};
  for(var i=0;i<stops.length;i++) _mapSelectedStops[stops[i].id]=true;

  var html='<label class="modal-label">Location Name</label>';
  html+='<input type="text" class="modal-input" id="locNameInput" maxlength="40" value="'+defaultName.replace(/"/g,'&quot;')+'" placeholder="e.g. My Stop">';
  html+='<div id="nameError" class="modal-error" style="display:none"></div>';
  html+='<label class="modal-label" style="margin-top:16px">Tap stops to select/deselect</label>';
  html+='<div class="map-counter" id="mapCounter">'+stops.length+' of '+stops.length+' stops selected</div>';
  html+='<div style="position:relative"><div id="stopMap"></div><button class="map-rescan" id="mapRescan" onclick="rescanArea()">Scan this area</button></div>';
  html+='<div id="stopError" class="modal-error" style="display:none"></div>';
  html+='<div class="modal-actions">';
  html+='<button class="modal-btn" onclick="closeCreationModal()">Cancel</button>';
  html+='<button class="modal-btn primary" onclick="handleSaveClick()">Save Location</button>';
  html+='</div>';
  body.innerHTML=html;

  // Init Leaflet map
  var coords=window._addLocCoords;
  var map=L.map('stopMap',{zoomControl:true,attributionControl:false}).setView([coords.lat,coords.lon],16);
  _mapInstance=map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);

  // User location marker (blue dot)
  L.circleMarker([coords.lat,coords.lon],{radius:8,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:0.9,weight:2}).addTo(map).bindPopup('You are here');

  // Stop markers
  _mapMarkers=[];
  var bounds=L.latLngBounds([[coords.lat,coords.lon]]);
  for(var j=0;j<stops.length;j++){
    (function(s){
      var selected=true;
      var marker=L.circleMarker([s.lat,s.lon],{
        radius:10,color:'#22c55e',fillColor:'#22c55e',fillOpacity:0.8,weight:2
      }).addTo(map);
      var dirLabel=s.direction?{N:'NB',S:'SB',E:'EB',W:'WB',NE:'NE',NW:'NW',SE:'SE',SW:'SW'}[s.direction]||s.direction:'';
      var routeStr=s.routeNames.length?'<br>Routes: '+s.routeNames.join(', '):'';
      marker.bindPopup('<b>'+s.name+'</b>'+(dirLabel?' · '+dirLabel:'')+routeStr,{className:'dark-popup'});
      marker.on('click',function(){
        selected=!selected;
        _mapSelectedStops[s.id]=selected;
        marker.setStyle({color:selected?'#22c55e':'#555',fillColor:selected?'#22c55e':'#555',fillOpacity:selected?0.8:0.4});
        updateMapCounter(stops.length);
      });
      bounds.extend([s.lat,s.lon]);
      _mapMarkers.push({marker:marker,stop:s});
    })(stops[j]);
  }
  map.fitBounds(bounds,{padding:[30,30]});
  // Fix Leaflet rendering in modal (tiles may not load until resize)
  setTimeout(function(){map.invalidateSize();},200);
  // Show "Scan this area" button when user pans the map
  var _initialCenter=map.getCenter();
  _mapInitialCenter=_initialCenter;
  map.on('moveend',function(){
    var c=map.getCenter();
    var dist=c.distanceTo(_mapInitialCenter);
    var btn=document.getElementById("mapRescan");
    if(btn) btn.style.display=dist>100?"block":"none";
  });
}

async function rescanArea(){
  if(!_mapInstance) return;
  var center=_mapInstance.getCenter();
  var lat=center.lat,lon=center.lng;
  window._addLocCoords={lat:lat,lon:lon};
  var btn=document.getElementById("mapRescan");
  if(btn){btn.textContent="Scanning...";btn.disabled=true;}
  try{
    var r=await fetch(OBA+"/stops-for-location.json?key="+KEY+"&lat="+lat+"&lon="+lon+"&radius=400");
    if(!r.ok) throw new Error("API error");
    var j=await r.json();
    var routeRefs={};
    for(var rt of (j.data.references.routes||[])) routeRefs[rt.id]=rt;
    var stops=(j.data.list||[]).map(function(s){
      var routeNames=(s.routeIds||[]).map(function(rid){
        var rt=routeRefs[rid];
        return rt?rt.shortName||rt.longName||"":"";
      }).filter(Boolean);
      return{id:s.id,name:s.name,direction:s.direction||"",lat:s.lat,lon:s.lon,routeNames:routeNames};
    });
    // Clear old markers
    _mapMarkers.forEach(function(m){_mapInstance.removeLayer(m.marker);});
    _mapMarkers=[];
    _mapSelectedStops={};
    // Add new markers
    for(var i=0;i<stops.length;i++) _mapSelectedStops[stops[i].id]=true;
    for(var j2=0;j2<stops.length;j2++){
      (function(s){
        var selected=true;
        var marker=L.circleMarker([s.lat,s.lon],{
          radius:10,color:'#22c55e',fillColor:'#22c55e',fillOpacity:0.8,weight:2
        }).addTo(_mapInstance);
        var dirLabel=s.direction?{N:'NB',S:'SB',E:'EB',W:'WB',NE:'NE',NW:'NW',SE:'SE',SW:'SW'}[s.direction]||s.direction:'';
        var routeStr=s.routeNames.length?'<br>Routes: '+s.routeNames.join(', '):'';
        marker.bindPopup('<b>'+s.name+'</b>'+(dirLabel?' · '+dirLabel:'')+routeStr,{className:'dark-popup'});
        marker.on('click',function(){
          selected=!selected;
          _mapSelectedStops[s.id]=selected;
          marker.setStyle({color:selected?'#22c55e':'#555',fillColor:selected?'#22c55e':'#555',fillOpacity:selected?0.8:0.4});
          updateMapCounter(stops.length);
        });
        _mapMarkers.push({marker:marker,stop:s});
      })(stops[j2]);
    }
    window._nearbyStops=stops;
    // Update counter and name suggestion
    updateMapCounter(stops.length);
    var nameInput=document.getElementById("locNameInput");
    if(nameInput&&!nameInput.dataset.userEdited){
      nameInput.value=suggestDefaultName(stops);
    }
    // Hide rescan button and update initial center
    if(btn){btn.style.display="none";btn.textContent="Scan this area";btn.disabled=false;}
    _mapInitialCenter=_mapInstance.getCenter();
  }catch(e){
    if(btn){btn.textContent="Scan this area";btn.disabled=false;}
  }
}

function updateMapCounter(total){
  var count=0;
  for(var k in _mapSelectedStops) if(_mapSelectedStops[k]) count++;
  var el=document.getElementById("mapCounter");
  if(el) el.textContent=count+' of '+total+' stops selected';
}

function handleSaveClick(){
  // Validate name
  var nameInput=document.getElementById("locNameInput");
  var name=nameInput.value.trim();
  var nameResult=validateLocationName(name);
  var nameErr=document.getElementById("nameError");
  if(!nameResult.valid){
    nameErr.textContent=nameResult.error;
    nameErr.style.display="block";
    nameInput.focus();
    return;
  }
  nameErr.style.display="none";

  // Collect selected stop IDs from map state
  var selectedIds=[];
  for(var k in _mapSelectedStops){if(_mapSelectedStops[k]) selectedIds.push(k);}
  var stopErr=document.getElementById("stopError");
  if(!selectedIds.length){
    stopErr.textContent="Select at least one stop.";
    stopErr.style.display="block";
    return;
  }
  stopErr.style.display="none";

  handleSaveLocation(name, selectedIds);
}

function handleSaveLocation(name, selectedIds){
  var coords=window._addLocCoords;
  if(!coords){
    document.getElementById("stopError").textContent="Location data lost. Please try again.";
    document.getElementById("stopError").style.display="block";
    return;
  }

  var newLoc={
    id:generateLocationId(),
    name:name,
    lat:coords.lat,
    lon:coords.lon,
    stopIds:selectedIds,
    createdAt:Date.now()
  };

  var existing=loadCustomLocations();
  existing.push(newLoc);
  var saved=saveCustomLocations(existing);

  if(!saved){
    document.getElementById("stopError").textContent="Couldn't save location. Your browser may not support local storage or storage is full.";
    document.getElementById("stopError").style.display="block";
    return;
  }

  // Clean up temp data
  delete window._addLocCoords;
  delete window._nearbyStops;

  // Close modal and switch to the new location
  closeCreationModal();
  switchLocation('custom', newLoc.id);
}

function switchLocation(type,id){
  currentType=type;
  currentStation=id;
  if(type==='builtin'){
    CFG=STATIONS[id]||STATIONS.caphill;
  } else if(type==='custom'){
    var cls=loadCustomLocations();
    var found=null;
    for(var i=0;i<cls.length;i++){if(cls[i].id===id){found=cls[i];break;}}
    if(found){CFG=buildCustomConfig(found,genericClassify);}
    else{CFG=STATIONS.caphill;currentType='builtin';currentStation='caphill';}
  }
  for(var k in routeCache) delete routeCache[k];
  cache.length=0;
  document.getElementById("stationName").textContent=CFG.name;
  saveActiveLocation(currentType,currentStation);
  renderLocationMenu();
  updateHeaderStar();
  document.getElementById("locMenu").classList.remove("open");
  document.getElementById("results").innerHTML='<div class="loading">Loading…</div>';
  preload();update();
  if(refreshInterval) clearInterval(refreshInterval);
  refreshInterval=setInterval(animatedUpdate,30000);
}

// Route number parser
function parseRoute(shortName,routeType,agencyId){
  return shortName.replace(/\s*Line$/i,"").replace(/\s*Streetcar$/i,"").trim();
}

// classify uses current station config
function classify(type,agencyId,shortName){
  return CFG.classify(type,agencyId,shortName);
}

async function fetchStop(id){
  const r=await fetch(`${OBA}/arrivals-and-departures-for-stop/${id}.json?key=${KEY}&minutesBefore=0&minutesAfter=60`);
  if(!r.ok)return[];
  const j=await r.json();
  const routes={};for(const rt of j.data.references.routes||[])routes[rt.id]=rt;
  return j.data.entry.arrivalsAndDepartures.map(a=>{
    const rt=routes[a.routeId]||{};
    const pred=a.predictedDepartureTime||a.predictedArrivalTime;
    const sched=a.scheduledDepartureTime||a.scheduledArrivalTime;
    const live=pred>0;
    const cls=classify(rt.type,rt.agencyId,rt.shortName||"");
    return{
      route:parseRoute(rt.shortName||"?",rt.type,rt.agencyId),
      headsign:a.tripHeadsign||rt.longName||"",
      ms:live?pred:sched,live,
      color:rt.color?`#${rt.color}`:"#666",
      textColor:rt.textColor?`#${rt.textColor}`:"#fff",
      ...cls,
    };
  });
}

async function fetchAll(){
  const ids=getAllStopIds();
  const res=await Promise.allSettled(ids.map(fetchStop));
  const deps=[];for(const r of res)if(r.status==="fulfilled")deps.push(...r.value);
  // Group by route+mode+direction (normalize headsign to first word for stability)
  const groups={};
  for(const d of deps){
    const dirKey=d.headsign.split(/[\s-]/)[0]||d.headsign; // stable first word
    const k=d.route+"|"+d.mode+"|"+dirKey;
    if(!groups[k])groups[k]={...d,etas:[]};
    groups[k].etas.push({ms:d.ms,live:d.live});
    // Keep the longest headsign for display
    if(d.headsign.length>groups[k].headsign.length)groups[k].headsign=d.headsign;
  }
  const list=Object.values(groups);
  for(const g of list){g.etas.sort((a,b)=>a.ms-b.ms);g.etas=g.etas.slice(0,3);}
  list.sort((a,b)=>(a.etas[0]?.ms||Infinity)-(b.etas[0]?.ms||Infinity));
  return list;
}

function etaText(ms){const m=Math.round((ms-Date.now())/60000);return m<=0?"NOW":`${m}`;}

// Fetch next-day schedule for routes with no current ETAs
async function fetchNextDaySchedule(stopIds){
  const tomorrow=new Date();
  tomorrow.setDate(tomorrow.getDate()+1);
  const dateStr=tomorrow.toISOString().split("T")[0];
  const nextDay=[];
  for(const id of stopIds){
    try{
      const r=await fetch(`${OBA}/schedule-for-stop/${id}.json?key=${KEY}&date=${dateStr}`);
      if(!r.ok)continue;
      const j=await r.json();
      const refs={};for(const rt of j.data.references.routes||[])refs[rt.id]=rt;
      for(const sr of j.data.entry.stopRouteSchedules||[]){
        const rt=refs[sr.routeId]||{};
        const cls=classify(rt.type,rt.agencyId,rt.shortName||"");
        for(const dir of sr.stopRouteDirectionSchedules||[]){
          const times=dir.scheduleStopTimes||[];
          if(!times.length)continue;
          const first3=times.slice(0,3).map(t=>t.arrivalTime||t.departureTime);
          nextDay.push({
            route:parseRoute(rt.shortName||"?",rt.type,rt.agencyId),
            headsign:dir.tripHeadsign||rt.longName||"",
            color:rt.color?`#${rt.color}`:"#666",
            textColor:rt.textColor?`#${rt.textColor}`:"#fff",
            ...cls,
            nextDayTimes:first3,
          });
        }
      }
    }catch(e){}
  }
  return nextDay;
}

function formatTime(ms){
  const d=new Date(ms);
  return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
}

function renderPill(eta,idx){
  const mins=Math.round((eta.ms-Date.now())/60000);
  if(mins<-1)return"";
  // Live + due now: neon green NOW capsule
  if(mins<=0&&eta.live)return`<div class="pill now"><span class="pill-num">NOW</span></div>`;
  // Scheduled + due now: grey "0"
  if(mins<=0&&!eta.live)return`<div class="pill sched"><span class="pill-num">0</span><span class="pill-min">min</span></div>`;
  // Urgency class based on position
  const urgClass=eta.live?(idx===0?"live-near":"live-far"):"sched";
  const liveIcon=eta.live?`<span class="material-symbols-rounded pill-live">rss_feed</span>`:"";
  return`<div class="pill ${urgClass}">${liveIcon}<span class="pill-num">${mins}</span><span class="pill-min">min</span></div>`;
}

function renderCard(g){
  const isIcon=g.badge==="square"&&(g.mode==="streetcar"||g.mode==="monorail"||g.mode==="swift");
  const numClass=g.route.length>2?"sm":"";
  const isRail=g.mode==="rail";
  const badgeInner=isIcon
    ?`<span class="badge-icon">${g.mode==="monorail"?"train":g.mode==="swift"?"directions_bus":"tram"}</span>`
    :`<span class="badge-num ${numClass}" style="color:${g.textColor}">${g.route}</span>${isRail?'<span class="badge-sub">LINE</span>':''}`;
  const pills=g.nextDayTimes
    ?`<div class="next-day-times"><span>${formatTime(g.nextDayTimes[0])}</span></div>`
    :g.etas.map((eta,i)=>renderPill(eta,i)).join("");
  const cardKey=g.route+"|"+g.headsign+"|"+g.mode;
  const isPinned=isRoutePinned(cardKey,g.route);
  const pinHtml=isPinned?'<span class="card-pin"><svg viewBox="0 0 24 24"><path d="M20 15.31L23.31 12 20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69z"/></svg></span>':'';
  const pinnedClass=isPinned?' pinned':'';
  // Tonal tint: derive from route color
  const r=parseInt(g.color.slice(1,3),16)/255;
  const gr=parseInt(g.color.slice(3,5),16)/255;
  const b=parseInt(g.color.slice(5,7),16)/255;
  const isLight=document.body.classList.contains("light");
  const tintOp=isLight?0.1:0.08;
  const tintBg=`rgba(${Math.round(r*255)},${Math.round(gr*255)},${Math.round(b*255)},${tintOp})`;
  // Neon tag: brighter version of route color
  const neonR=Math.min(1,r*1.5+0.15);
  const neonG=Math.min(1,gr*1.5+0.15);
  const neonB=Math.min(1,b*1.5+0.15);
  const tagBg=`rgba(${Math.round(neonR*255)},${Math.round(neonG*255)},${Math.round(neonB*255)},0.1)`;
  const tagColor=isLight
    ?`rgb(${Math.round(r*180)},${Math.round(gr*180)},${Math.round(b*180)})`
    :`rgb(${Math.round(neonR*255)},${Math.round(neonG*255)},${Math.round(neonB*255)})`;
  return`<div class="card${pinnedClass}" data-key="${cardKey}" data-route="${g.route}" style="background:${tintBg}">
    ${pinHtml}
    <div class="badge ${g.badge}" style="background:${g.color}">
      ${badgeInner}
    </div>
    <div class="info">
      <div class="tag" style="background:${tagBg};color:${tagColor}">${g.tag}</div>
      <div class="dest">${g.headsign}</div>
    </div>
    <div class="etas">${pills}</div>
  </div>`;
}

// Check if a card is pinned. User overrides use cardKey (per-direction).
// Pre-set defaults use route name (both directions).
function isRoutePinned(cardKey,routeName){
  var override=loadPriorityOverride(currentStation);
  if(override!==null){
    // User has overrides — check by cardKey only
    return override.indexOf(cardKey)>=0;
  }
  // No override — use pre-set defaults (match by route name)
  return CFG.priority.indexOf(routeName)>=0;
}

function prioritySort(a,b){
  var aKey=a.route+"|"+a.headsign+"|"+a.mode;
  var bKey=b.route+"|"+b.headsign+"|"+b.mode;
  var aPinned=isRoutePinned(aKey,a.route)?0:1;
  var bPinned=isRoutePinned(bKey,b.route)?0:1;
  if(aPinned!==bPinned)return aPinned-bPinned;
  return(a.etas[0]?.ms||Infinity)-(b.etas[0]?.ms||Infinity);
}

const cache=[];
const routeCache={}; // keyed by route+direction, persists between refreshes

// Long-press to toggle priority (500ms hold)
var _lpTimer=null;
var _lpFired=false;
function attachLongPress(){
  document.querySelectorAll(".card[data-route]").forEach(function(card){
    function startPress(e){
      _lpFired=false;
      var el=card;
      _lpTimer=setTimeout(function(){
        _lpFired=true;
        if(navigator.vibrate) navigator.vibrate(30);
        togglePriority(el);
      },500);
    }
    function endPress(){clearTimeout(_lpTimer);}
    function cancelPress(){clearTimeout(_lpTimer);}
    card.addEventListener("touchstart",function(e){startPress(e);},{passive:true});
    card.addEventListener("touchend",endPress);
    card.addEventListener("touchmove",cancelPress);
    card.addEventListener("touchcancel",cancelPress);
    card.addEventListener("mousedown",startPress);
    card.addEventListener("mouseup",endPress);
    card.addEventListener("mouseleave",cancelPress);
    card.addEventListener("contextmenu",function(e){e.preventDefault();});
  });
}

function togglePriority(cardEl){
  var cardKey=cardEl.getAttribute("data-key");
  if(!cardKey)return;
  // Load or initialize override from current state
  var override=loadPriorityOverride(currentStation);
  var pri;
  if(override!==null){
    pri=override.slice();
  } else {
    // First user override — convert pre-set defaults to cardKey format
    // by checking which current cards match the default route names
    pri=[];
    for(var i=0;i<cache.length;i++){
      var g=cache[i];
      if(CFG.priority.indexOf(g.route)>=0){
        pri.push(g.route+"|"+g.headsign+"|"+g.mode);
      }
    }
  }
  var idx=pri.indexOf(cardKey);
  if(idx>=0){pri.splice(idx,1);}else{pri.push(cardKey);}
  savePriorityOverride(currentStation,pri);
  // Re-render cards with updated priority
  var el=document.getElementById("results");
  cache.sort(prioritySort);
  el.innerHTML=cache.map(renderCard).join("");
  attachLongPress();
}

async function update(){
  document.getElementById("updated").textContent="Updating...";
  try{
    const groups=await fetchAll();
    // Merge new data into persistent cache
    for(const g of groups){
      const dirKey=g.headsign.split(/[\s-]/)[0]||g.headsign;
      const k=g.route+"|"+g.mode+"|"+dirKey;
      routeCache[k]={...g};
    }
    // Remove routes whose last ETA is more than 30 min in the past
    const now=Date.now();
    for(const k in routeCache){
      const g=routeCache[k];
      const latest=g.etas[g.etas.length-1];
      if(latest&&latest.ms<now-30*60000){
        // Don't delete — mark for next-day fetch
        g.etas=[];
      }
    }
    // If any routes have empty ETAs, fetch next-day schedule
    const emptyRoutes=Object.values(routeCache).filter(g=>!g.etas.length);
    if(emptyRoutes.length){
      const allStopIds=getAllStopIds();
      const nextDay=await fetchNextDaySchedule(allStopIds);
      for(const nd of nextDay){
        const dirKey=nd.headsign.split(/[\s-]/)[0]||nd.headsign;
        const k=nd.route+"|"+nd.mode+"|"+dirKey;
        if(routeCache[k]&&!routeCache[k].etas.length){
          routeCache[k].nextDayTimes=nd.nextDayTimes;
        } else if(!routeCache[k]){
          routeCache[k]={...nd,etas:[]};
        }
      }
    }
    // Clear nextDayTimes for routes that have active ETAs
    for(const k in routeCache){
      if(routeCache[k].etas.length)delete routeCache[k].nextDayTimes;
    }
    // Sort by earliest upcoming ETA
    // Sort: prioritized routes first, then by earliest ETA
    const sorted=Object.values(routeCache).sort(prioritySort);
    cache.length=0;cache.push(...sorted);
  }catch(e){console.error(e);}
  const el=document.getElementById("results");
  if(!cache.length){
    el.innerHTML='<div class="loading" style="grid-column:1/-1;text-align:center;font-size:20px;padding:40px">No transit results found</div>';
  } else {
    el.innerHTML=cache.map(renderCard).join("");
  }
  attachLongPress();
  document.getElementById("updated").textContent=`Updated ${new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}`;
  document.getElementById("dot").classList.remove("error");
}

function animatedUpdate(){
  const el=document.getElementById("results");
  // FLIP: record old positions
  const oldCards={};
  el.querySelectorAll(".card").forEach(c=>{
    const key=c.dataset.key;
    if(key)oldCards[key]=c.getBoundingClientRect();
  });
  // Run update
  update().then(()=>{
    // FLIP: get new positions and animate
    el.querySelectorAll(".card").forEach(c=>{
      const key=c.dataset.key;
      if(!key||!oldCards[key])return;
      const oldRect=oldCards[key];
      const newRect=c.getBoundingClientRect();
      const dx=oldRect.left-newRect.left;
      const dy=oldRect.top-newRect.top;
      if(Math.abs(dx)<1&&Math.abs(dy)<1)return;
      c.style.transition="none";
      c.style.transform=`translate(${dx}px,${dy}px)`;
      requestAnimationFrame(()=>{
        c.style.transition="transform 0.4s ease";
        c.style.transform="";
      });
    });
  });
}

function tick(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});}

// Preload: fetch today's schedule to show cards immediately
async function preload(){
  const allStopIds=getAllStopIds();
  const now=Date.now();
  const results=await Promise.allSettled(allStopIds.map(async id=>{
    const r=await fetch(`${OBA}/schedule-for-stop/${id}.json?key=${KEY}`);
    if(!r.ok)return[];
    const j=await r.json();
    const refs={};for(const rt of j.data.references.routes||[])refs[rt.id]=rt;
    const items=[];
    for(const sr of j.data.entry.stopRouteSchedules||[]){
      const rt=refs[sr.routeId]||{};
      const cls=classify(rt.type,rt.agencyId,rt.shortName||"");
      for(const dir of sr.stopRouteDirectionSchedules||[]){
        const times=(dir.scheduleStopTimes||[]).filter(t=>(t.arrivalTime||t.departureTime)>now);
        if(!times.length)continue;
        items.push({
          route:parseRoute(rt.shortName||"?",rt.type,rt.agencyId),
          headsign:dir.tripHeadsign||rt.longName||"",
          color:rt.color?`#${rt.color}`:"#666",
          textColor:rt.textColor?`#${rt.textColor}`:"#fff",
          ...cls,
        });
      }
    }
    return items;
  }));
  for(const r of results){
    if(r.status!=="fulfilled")continue;
    for(const item of r.value){
      const dirKey=item.headsign.split(/[\s-]/)[0]||item.headsign;
      const k=item.route+"|"+item.mode+"|"+dirKey;
      if(!routeCache[k])routeCache[k]={...item,etas:[]};
    }
  }
  // Render preloaded data
  const sorted=Object.values(routeCache).sort(prioritySort);
  cache.length=0;cache.push(...sorted);
  const el=document.getElementById("results");
  el.innerHTML=cache.map(renderCard).join("");
  attachLongPress();
  document.getElementById("updated").textContent="Schedule loaded";
}

tick();setInterval(tick,1000);
// Boot: start preload and live fetch in parallel
let refreshInterval;
(async function boot(){
  const preloadDone=preload();
  const updateDone=update();
  await Promise.all([preloadDone,updateDone]);
  refreshInterval=setInterval(animatedUpdate,30000);
})();
let rt;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(update,200);});
document.addEventListener("click",e=>{if(!e.target.closest(".station"))document.getElementById("locMenu").classList.remove("open");});
// Render dynamic location menu
renderLocationMenu();
document.getElementById("creationModal").addEventListener("click",function(e){
  if(e.target===this) closeCreationModal();
});
function toggleTheme(){
  document.body.classList.toggle("light");
  var isLight=document.body.classList.contains("light");
  document.getElementById("themeLabel").textContent=isLight?"Dark":"Light";
  localStorage.setItem("nextup_theme",isLight?"light":"dark");
  // Re-render cards to update tint colors for light theme
  var el=document.getElementById("results");
  if(cache.length) el.innerHTML=cache.map(renderCard).join("");
  attachLongPress();
}
// Auto-detect system theme on load
(function(){
  var saved=localStorage.getItem("nextup_theme");
  var isLight;
  if(saved){isLight=saved==="light";}
  else{isLight=window.matchMedia&&window.matchMedia("(prefers-color-scheme:light)").matches;}
  if(isLight) document.body.classList.add("light");
  document.getElementById("themeLabel").textContent=isLight?"Dark":"Light";
  // Listen for system theme changes
  if(window.matchMedia){
    window.matchMedia("(prefers-color-scheme:light)").addEventListener("change",function(e){
      if(localStorage.getItem("nextup_theme")) return; // user override, don't auto-switch
      if(e.matches) document.body.classList.add("light");
      else document.body.classList.remove("light");
      document.getElementById("themeLabel").textContent=document.body.classList.contains("light")?"Dark":"Light";
      var el=document.getElementById("results");
      if(cache.length) el.innerHTML=cache.map(renderCard).join("");
      attachLongPress();
    });
  }
})();
</script>
